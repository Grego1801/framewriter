name: Build FrameWriter

on: [push]

jobs:
  build-android64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build mod
        uses: geode-sdk/build-geode-mod@main
        id: build
        with:
          target: Android64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FrameWriter-android64
          path: ${{ steps.build.outputs.build-output }}
